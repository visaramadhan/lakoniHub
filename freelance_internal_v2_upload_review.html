function rp(n){return 'Rp '+Math.round(n).toLocaleString('id')}
function catN(id){var c=cats.find(x=>x.id==id);return c?c.name:'—'}
function userN(id){var u=users.find(x=>x.id==id);return u?u.name:'—'}
function projT(id){var p=projects.find(x=>x.id==id);return p?p.title:'—'}
function ini(n){return (n||'').split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase()}
function escH(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function sPill(s){
  var m={OPEN:'p-op',ON_PROGRESS:'p-pr',REVISION:'p-rv',DONE:'p-do',CANCELLED:'p-ca'};
  var l={OPEN:'Open',ON_PROGRESS:'On Progress',REVISION:'Revision',DONE:'Done',CANCELLED:'Cancelled'};
  return '<span class="bp2 '+(m[s]||'')+'">'+l[s]+'</span>';
}
function rPill(s){
  if(!s)return '<span style="color:var(--t3);font-size:11px">—</span>';
  var m={WAITING:'p-wa',REVISION:'p-rv',ACCEPTED:'p-ac'};
  var l={WAITING:'Menunggu Review',REVISION:'Perlu Revisi',ACCEPTED:'Diterima'};
  return '<span class="bp2 '+(m[s]||'')+'">'+l[s]+'</span>';
}
function payPill(s){
  var m={PENDING:'p-pe',PROCESS:'p-pc',PAID:'p-pa'};
  return '<span class="bp2 '+(m[s]||'')+'">'+s+'</span>';
}
function dlBadge(dl){
  if(!dl)return '';
  var today=new Date(),d=new Date(dl),diff=Math.ceil((d-today)/(1000*60*60*24));
  if(diff<0)return '<span class="dl-badge dl-over"><i class="ti ti-alert-triangle" style="font-size:11px" aria-hidden="true"></i> Terlambat '+Math.abs(diff)+'h</span>';
  if(diff<=3)return '<span class="dl-badge dl-warn"><i class="ti ti-clock" style="font-size:11px" aria-hidden="true"></i> '+diff+' hari lagi</span>';
  return '<span class="dl-badge dl-ok"><i class="ti ti-calendar" style="font-size:11px" aria-hidden="true"></i> '+dl+'</span>';
}
function fIcon(name){
  var ext=(name||'').split('.').pop().toLowerCase();
  var m={pdf:'ti-file-type-pdf',zip:'ti-file-zip',fig:'ti-file',sketch:'ti-file',xlsx:'ti-file-spreadsheet',docx:'ti-file-text',png:'ti-photo',jpg:'ti-photo',mp4:'ti-video'};
  return m[ext]||'ti-file';
}

function toast(msg,cls,dur){
  var t=document.getElementById('toast');
  var d=document.createElement('div');
  d.className='ti2 '+(cls||'ts');
  var ic=cls=='te'?'ti-x':cls=='tw2'?'ti-alert-triangle':'ti-check';
  d.innerHTML='<i class="ti '+ic+'" aria-hidden="true"></i>'+msg;
  t.appendChild(d);
  setTimeout(()=>d.remove(),dur||2800);
}

function rMiniChart(){
  var st=[
    {l:'Open',c:projects.filter(p=>p.status=='OPEN').length,col:'var(--bl)'},
    {l:'Progress',c:projects.filter(p=>p.status=='ON_PROGRESS').length,col:'var(--am)'},
    {l:'Revision',c:projects.filter(p=>p.status=='REVISION').length,col:'var(--pu)'},
    {l:'Done',c:projects.filter(p=>p.status=='DONE').length,col:'var(--gn)'},
    {l:'Cancel',c:projects.filter(p=>p.status=='CANCELLED').length,col:'var(--rd)'}
  ];
  var mx=Math.max(...st.map(s=>s.c),1);
  return '<div style="display:flex;align-items:flex-end;gap:6px;height:72px;padding-bottom:4px">'+st.map(s=>
    '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">'
    +'<div style="width:100%;height:56px;position:relative;background:var(--color-background-secondary);border-radius:3px 3px 0 0">'
    +'<div style="width:100%;height:'+Math.round((s.c/mx)*56)+'px;background:'+s.col+';border-radius:3px 3px 0 0;position:absolute;bottom:0"></div></div>'
    +'<div style="font-size:9px;color:var(--t3)">'+s.l+'</div>'
    +'<div style="font-size:9px;font-weight:500">'+s.c+'</div></div>'
  ).join('')+'</div>';
}

function savePrj(){
  var t=document.getElementById('fp-t').value.trim();
  if(!t){toast('Judul wajib diisi','te');return}
  var dl=document.getElementById('fp-dl').value;
  if(!dl){toast('Deadline wajib diisi','te');return}
  var rdl=document.getElementById('fp-rdl').value||null;
  var st=document.getElementById('fp-s').value;
  var au=document.getElementById('fp-au').value||null;
  if(EID){
    var p=projects.find(x=>x.id==EID);
    p.title=t;p.cat=+document.getElementById('fp-c').value;
    p.budget=+document.getElementById('fp-b').value;
    p.deadline=dl;p.revDeadline=rdl;p.status=st;
    p.feeP=+document.getElementById('fp-fp').value;
    p.assigned=au?+au:null;
    p.desc=document.getElementById('fp-ds').value;
    if(st=='DONE'&&p.assigned&&!earnings.find(e=>e.projectId==EID)){
      var g=p.budget,f=Math.round(g*p.feeP/100);
      earnings.push({id:earnings.length+1,userId:p.assigned,projectId:EID,gross:g,feeP:p.feeP,feeAmt:f,final:g-f,payoutStatus:'PENDING',paidAt:null});
      toast('Earning otomatis dibuat!','ts');
    }
    if(rdl)actLog.unshift({t:new Date().toLocaleString('id'),a:'Deadline revisi project "'+t+'" diset: '+rdl});
    toast('Project diperbarui','ts');
  } else {
    var nid=Math.max(...projects.map(x=>x.id))+1;
    projects.push({id:nid,title:t,cat:+document.getElementById('fp-c').value,budget:+document.getElementById('fp-b').value,deadline:dl,revDeadline:rdl,status:st,reviewStatus:null,desc:document.getElementById('fp-ds').value,feeP:+document.getElementById('fp-fp').value,assigned:null,createdBy:1,uploads:[]});
    actLog.unshift({t:new Date().toLocaleString('id'),a:'Project baru "'+t+'" dibuat oleh Admin'+(rdl?' — deadline: '+dl+', deadline revisi: '+rdl:' — deadline: '+dl)});
    toast('Project ditambahkan','ts');
  }
  closeModal();renderP('projects');
}

function renderUploadModal(p){
  var isAdmin=CR=='admin';
  var steps=[
    {l:'Upload File',done:p.uploads.length>0},
    {l:'Review Admin',done:p.uploads.some(u=>u.reviewStatus!='WAITING')},
    {l:'Revisi / ACC',done:p.uploads.some(u=>u.reviewStatus=='ACCEPTED')}
  ];
  var stepBar='<div class="step-bar">';
  steps.forEach((s,i)=>{
    stepBar+='<div class="step '+(s.done?'done':i==0&&!steps[0].done?'active':'')+'">'
      +'<div class="step-dot">'+(s.done?'<i class="ti ti-check" aria-hidden="true" style="font-size:10px"></i>':(i+1))+'</div>'+s.l+'</div>';
    if(i<steps.length-1)stepBar+='<div class="step-line '+(s.done?'done':'')+'"></div>';
  });
  stepBar+='</div>';

  var uploadSec='';
  if(!isAdmin&&(p.status=='ON_PROGRESS'||p.status=='REVISION')){
    uploadSec='<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:500;margin-bottom:8px;color:var(--tx)"><i class="ti ti-upload" aria-hidden="true"></i> Upload File Hasil Kerja</div>'
      +'<div class="upload-zone" onclick="fakeUpload('+p.id+')">'
      +'<i class="ti ti-cloud-upload" aria-hidden="true"></i>'
      +'<p>Klik untuk upload file</p>'
      +'<span>PDF, ZIP, Fig, Sketch, XLSX, PNG — maks 50 MB</span>'
      +'</div></div>';
  }

  var fileList='';
  if(p.uploads.length==0){
    fileList='<div class="es"><i class="ti ti-files" aria-hidden="true"></i>Belum ada file diupload</div>';
  } else {
    fileList=p.uploads.map(u=>{
      var canReview=isAdmin&&u.reviewStatus=='WAITING';
      var isRevision=u.reviewStatus=='REVISION';
      var isAcc=u.reviewStatus=='ACCEPTED';
      return '<div style="border:0.5px solid var(--br);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:8px">'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
        +'<i class="ti '+fIcon(u.name)+'" style="font-size:18px;color:var(--ac);flex-shrink:0" aria-hidden="true"></i>'
        +'<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(u.name)+'</div>'
        +'<div style="font-size:11px;color:var(--t2)">'+u.upName+' &nbsp;·&nbsp; '+u.size+' &nbsp;·&nbsp; '+u.upAt+'</div></div>'
        +'<div>'+rPill(u.reviewStatus)+'</div>'
        +'</div>'
        +(isRevision?'<div style="background:var(--pul);border-radius:var(--border-radius-md);padding:8px 10px;margin-bottom:8px;font-size:11px">'
          +'<div style="font-weight:500;color:var(--put);margin-bottom:3px"><i class="ti ti-alert-circle" aria-hidden="true"></i> Catatan Revisi</div>'
          +'<div style="color:var(--put)">'+escH(u.revNote||'')+'</div>'
          +(u.revDeadline?'<div style="margin-top:5px">Deadline revisi: '+dlBadge(u.revDeadline)+'</div>':'')
          +'</div>':'')
        +(isAcc?'<div style="background:var(--gnl);border-radius:var(--border-radius-md);padding:6px 10px;margin-bottom:8px;font-size:11px;color:var(--gnt)"><i class="ti ti-circle-check" aria-hidden="true"></i> File diterima oleh admin</div>':'')
        +(canReview?'<div class="review-box">'
          +'<div class="rb-title"><i class="ti ti-clipboard" aria-hidden="true"></i> Review File</div>'
          +'<div class="fr"><label>Catatan (opsional)</label><textarea id="rv-note-'+u.id+'" placeholder="Tulis catatan atau alasan revisi..."></textarea></div>'
          +'<div class="fr"><label><i class="ti ti-calendar" aria-hidden="true"></i> Deadline Revisi (jika revisi)</label><input id="rv-dl-'+u.id+'" type="date"></div>'
          +'<div class="review-actions">'
          +'<button class="bsm bdn" onclick="reviewFile('+p.id+','+u.id+',\'REVISION\')"><i class="ti ti-refresh" aria-hidden="true"></i> Minta Revisi</button>'
          +'<button class="bsm bsc" onclick="reviewFile('+p.id+','+u.id+',\'ACCEPTED\')"><i class="ti ti-circle-check" aria-hidden="true"></i> ACC / Terima</button>'
          +'</div></div>':'')
        +'</div>';
    }).join('');
  }

  showModal('File & Review — '+escH(p.title),
    stepBar
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
    +'<div style="font-size:12px;font-weight:500">'+p.uploads.length+' file diupload</div>'
    +(p.deadline?'<div class="info-row"><i class="ti ti-calendar" aria-hidden="true"></i> Deadline: <span class="info-val">'+p.deadline+'</span> '+dlBadge(p.deadline)+'</div>':'')
    +'</div>'
    +(p.revDeadline?'<div class="info-row" style="margin-bottom:10px"><i class="ti ti-calendar-time" style="color:var(--pu)" aria-hidden="true"></i> Deadline Revisi: <span class="info-val">'+p.revDeadline+'</span> '+dlBadge(p.revDeadline)+'</div>':'')
    +uploadSec
    +'<div style="font-size:12px;font-weight:500;margin-bottom:8px;color:var(--tx)"><i class="ti ti-files" aria-hidden="true"></i> Daftar File</div>'
    +fileList,
    null
  );
}

function fakeUpload(pid){
  var p=projects.find(x=>x.id==pid);
  var names=['hasil_kerja_v'+Math.floor(Math.random()*3+1)+'.zip','file_revisi_'+Math.floor(Math.random()*10)+'.pdf','update_'+Math.floor(Math.random()*10)+'.fig','output_final.xlsx'];
  var nm=names[Math.floor(Math.random()*names.length)];
  var sz=Math.round(Math.random()*10*10)/10+' MB';
  var newFile={id:Date.now(),name:nm,size:sz,upBy:2,upName:CU.name,upAt:new Date().toLocaleString('id'),reviewStatus:'WAITING',revNote:null,revDeadline:null};
  p.uploads.push(newFile);
  if(p.status=='REVISION')p.status='ON_PROGRESS';
  p.reviewStatus='WAITING';
  actLog.unshift({t:new Date().toLocaleString('id'),a:CU.name+' upload file "'+nm+'" pada project "'+p.title+'"'});
  toast('File berhasil diupload! Menunggu review admin.','ts');
  renderUploadModal(p);
}

function reviewFile(pid,uid,decision){
  var p=projects.find(x=>x.id==pid);
  var u=p.uploads.find(x=>x.id==uid);
  var note=document.getElementById('rv-note-'+uid)?document.getElementById('rv-note-'+uid).value:'';
  var dl=document.getElementById('rv-dl-'+uid)?document.getElementById('rv-dl-'+uid).value:'';
  u.reviewStatus=decision;
  u.revNote=note||null;
  u.revDeadline=decision=='REVISION'&&dl?dl:null;
  if(decision=='REVISION'){
    p.status='REVISION';p.reviewStatus='REVISION';
    if(dl)p.revDeadline=dl;
    actLog.unshift({t:new Date().toLocaleString('id'),a:'Admin minta revisi file "'+u.name+'"'+(note?' — '+note:'')+( dl?' (deadline: '+dl+')':'')});
    toast('File dikembalikan untuk revisi.','tw2');
  } else {
    var allDone=p.uploads.every(f=>f.reviewStatus=='ACCEPTED');
    if(allDone){p.status='DONE';p.reviewStatus='ACCEPTED';
      if(p.assigned&&!earnings.find(e=>e.projectId==pid)){
        var g=p.budget,f=Math.round(g*p.feeP/100);
        earnings.push({id:earnings.length+1,userId:p.assigned,projectId:pid,gross:g,feeP:p.feeP,feeAmt:f,final:g-f,payoutStatus:'PENDING',paidAt:null});
        toast('Semua file diterima — project DONE & earning dibuat!','ts',3500);
      } else toast('File diterima — semua file sudah ACC, project DONE!','ts',3200);
    } else {
      p.reviewStatus='WAITING';
      toast('File diterima. Masih ada file lain yang menunggu.','ts');
    }
    actLog.unshift({t:new Date().toLocaleString('id'),a:'Admin ACC file "'+u.name+'" — project "'+p.title+'"'});
  }
  renderUploadModal(p);
}

        +'<td>'+(wt>0?'<span class="bp2 p-wa" style="font-size:10px">'+wt+' menunggu review</span>':rv>0?'<span class="bp2 p-rv" style="font-size:10px">'+rv+' perlu revisi</span>':p.uploads.length>0?'<span class="bp2 p-ac" style="font-size:10px">'+p.uploads.length+' file OK</span>':'<span style="color:var(--t3)">—</span>')+'</td>'
        +'<td><div class="ab">'
        +'<button class="ib gn" onclick="openUploadModal('+p.id+')" title="Upload & Lihat Review"><i class="ti ti-paperclip" aria-hidden="true"></i></button>'
        +'<button class="ib" onclick="openCmtModal('+p.id+')" title="Chat"><i class="ti ti-message" aria-hidden="true"></i></button>'
        +'</div></td></tr>';
    }).join('')+(myP.length==0?'<tr><td colspan="6" style="text-align:center;color:var(--t3);padding:24px"><i class="ti ti-folder-off" aria-hidden="true" style="font-size:22px;display:block;opacity:.3;margin-bottom:8px"></i><a href="#" onclick="nav(\'projects\');return false" style="color:var(--ac)">Ambil project sekarang</a></td></tr>':'')
    +'</tbody></table></div></div>';
}

function rEarnings(c){
  var myE=earnings.filter(e=>e.userId==2);
  var t=myE.reduce((a,b)=>a+b.final,0),pd=myE.filter(e=>e.payoutStatus=='PAID').reduce((a,b)=>a+b.final,0);
  c.innerHTML='<div class="sg"><div class="sc"><div class="sl">Total Earning</div><div class="sv" style="font-size:15px">'+rp(t)+'</div></div>'
    +'<div class="sc"><div class="sl">Dibayar</div><div class="sv" style="font-size:15px;color:var(--gn)">'+rp(pd)+'</div></div>'
    +'<div class="sc"><div class="sl">Pending</div><div class="sv" style="font-size:15px;color:var(--am)">'+rp(t-pd)+'</div></div></div>'
    +'<div class="card"><div class="ch"><span class="ct2">Riwayat Earning</span></div>'
    +'<div class="tw"><table style="table-layout:auto"><thead><tr><th>Project</th><th>Gross</th><th>Fee</th><th>Net</th><th>Status</th></tr></thead><tbody>'
    +myE.map(e=>'<tr><td>'+escH(projT(e.projectId))+'</td><td>'+rp(e.gross)+'</td><td style="color:var(--rd)">-'+rp(e.feeAmt)+'</td><td style="color:var(--gn);font-weight:500">'+rp(e.final)+'</td><td>'+payPill(e.payoutStatus)+'</td></tr>').join('')
    +(myE.length==0?'<tr><td colspan="5" style="text-align:center;color:var(--t3);padding:24px">Belum ada earning</td></tr>':'')
    +'</tbody></table></div></div>';
}

function showModal(title,body,saveAct){
  var ov=document.createElement('div');
  ov.className='mo';ov.id='mo';
  ov.onclick=function(e){if(e.target===ov)closeModal()};
  ov.innerHTML='<div class="md">'
    +'<div class="mh"><span class="mt">'+title+'</span><button class="ib" onclick="closeModal()"><i class="ti ti-x" aria-hidden="true"></i></button></div>'
    +'<div class="mb2">'+body+'</div>'
    +(saveAct?'<div class="mf"><button class="bsm" onclick="closeModal()">Batal</button><button class="bsm ba" onclick="'+saveAct+'()"><i class="ti ti-device-floppy" aria-hidden="true"></i> Simpan</button></div>':'')
    +'</div>';
  document.getElementById('app').appendChild(ov);
}
function closeModal(){var o=document.getElementById('mo');if(o)o.remove()}
</script>
